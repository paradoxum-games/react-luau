# Rokit is the target tool manager for the Paradoxum fork. Keep migrated tool
# versions aligned with foreman.toml during the transition. Add public replacement
# tools deliberately, and evaluate upgrades separately from the package migration.
#
# Rotriever, roblox-cli, and robloxdev-cli are Roblox-internal legacy tools. This
# manifest does not install them, and their declared sources are unavailable
# externally. Retain their commands only as parity references until public gates
# replace them.

[tools]
rojo = "rojo-rbx/rojo@7.7.0"
selene = "Kampfkarren/selene@0.28.0"
stylua = "JohnnyMorganz/StyLua@0.18.1"
lute = "luau-lang/lute@0.1.0-nightly.20260307"
wally = "UpliftGames/wally@0.3.2"
rocale-cli = "Roblox/rocale-cli@0.1.2"
