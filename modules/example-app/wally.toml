[package]
# This is a post-publish registry smoke-test manifest, not a publishable package.
# The local unpublished-artifact fixture lives under tests/wally-consumer.
name = "paradoxum/react-luau-install-test"
description = "Install-test consumer for the Paradoxum React Luau package family."
version = "0.0.0"
license = "MIT"
authors = ["Paradoxum Games"]
realm = "shared"
registry = "https://github.com/paradoxum-games/wally-index"
private = true

[dependencies]
ReactGlobals = "paradoxum/react-globals@=17.3.10"
Shared = "paradoxum/react-shared@=17.3.10"
React = "paradoxum/react@=17.3.10"
Scheduler = "paradoxum/react-scheduler@=17.3.10"
ReactIs = "paradoxum/react-is@=17.3.10"
ReactReconciler = "paradoxum/react-reconciler@=17.3.10"
ReactRoblox = "paradoxum/react-roblox@=17.3.10"
ReactTestRenderer = "paradoxum/react-test-renderer@=17.3.10"
RoactCompat = "paradoxum/roact-compat@=17.3.10"
