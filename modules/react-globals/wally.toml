[package]
name = "paradoxum/react-globals"
description = "Shared globals (e.g. __DEV__) consumed across React Luau packages."
version = "17.3.10"
license = "MIT"
authors = ["Paradoxum Games", "Roblox <no-reply@roblox.com>"]
realm = "shared"
registry = "https://github.com/paradoxum-games/wally-index"
repository = "https://github.com/paradoxum-games/react-luau"
private = true
exclude = [
	"rotriever.toml",
	".robloxrc",
	"src/**/__tests__",
	"src/**/__tests__/**",
	"src/**/__snapshots__",
	"src/**/__snapshots__/**",
	"src/**/*.spec.lua",
	"src/**/*.test.lua",
]

[dependencies]
SafeFlags = "roblox/safe-flags@=0.1.2"
